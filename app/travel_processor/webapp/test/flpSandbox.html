<!DOCTYPE HTML>
<html>
<!-- Copyright (c) 2015 SAP AG, All Rights Reserved -->
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appTitle}}</title>

    <!-- Bootstrap the unified shell in sandbox mode for standalone usage.

         Both the Travel and the Customer apps are registered here so that the
         UI.DataFieldForIntentBasedNavigation target "Customer-display" can be
         resolved by the CrossApplicationNavigation service. Without a second
         registered inbound the action is hidden at runtime.
    -->
    <script type="text/javascript">
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            bootstrapPlugins: {
                "RuntimeAuthoringPlugin": {
                    component: "sap.ushell.plugins.rta",
                    config: {
                        validateAppVersion: false
                    }
                }
            },
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            search: "hidden"
                        }
                    }
                }
            },
            applications: {
                "Travel-manage": {
                    title: "Travels",
                    description: "Manage Travels",
                    additionalInformation: "SAPUI5.Component=sap.fe.cap.travel",
                    applicationType: "URL",
                    url: "../"
                },
                "Customer-display": {
                    title: "Customers",
                    description: "Display Customers",
                    additionalInformation: "SAPUI5.Component=sap.fe.cap.customer",
                    applicationType: "URL",
                    url: "../../sap.fe.cap.customer/"
                }
            }
        };
    </script>

    <script src="https://sapui5.hana.ondemand.com/1.145.0/test-resources/sap/ushell/bootstrap/sandbox.js" id="sap-ushell-bootstrap"></script>
    <!-- Bootstrap the UI5 core library -->
    <script id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.145.0/resources/sap-ui-core.js"
        data-sap-ui-libs=""
        data-sap-ui-async="true"
        data-sap-ui-preload="async"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-language="en"
        data-sap-ui-resourceroots='{"sap.fe.cap.travel": "../", "sap.fe.cap.customer": "../../sap.fe.cap.customer/"}'
        data-sap-ui-frameOptions="allow"> // NON-SECURE setting for testing environment
    </script>
    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>

<!-- UI Content -->

<body class="sapUiBody" id="content">
</body>

</html>
